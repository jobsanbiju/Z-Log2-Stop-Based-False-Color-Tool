<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="360" viewBox="0 0 1600 360" role="img" aria-labelledby="title desc">
  <title id="title">IRE-Based Exposure versus Stop-Based Exposure</title>
  <desc id="desc">Two-column comparison between IRE-based and stop-based exposure questions.</desc>
  <rect width="1600" height="360" fill="#0b0b0b"/>
  <rect x="72" y="58" width="698" height="244" rx="22" fill="#151515" stroke="#303030"/>
  <rect x="830" y="58" width="698" height="244" rx="22" fill="#151515" stroke="#303030"/>
  <text x="421" y="122" text-anchor="middle" fill="#f1f1ee" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">IRE-Based Exposure</text>
  <text x="1179" y="122" text-anchor="middle" fill="#f1f1ee" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Stop-Based Exposure</text>
  <text x="421" y="194" text-anchor="middle" fill="#bdbdb8" font-family="Arial, Helvetica, sans-serif" font-size="30">Is skin at 63 IRE or 67 IRE?</text>
  <text x="1179" y="194" text-anchor="middle" fill="#bdbdb8" font-family="Arial, Helvetica, sans-serif" font-size="30">Is skin one stop above middle grey?</text>
  <rect x="252" y="238" width="338" height="8" rx="4" fill="#898989"/>
  <rect x="1010" y="238" width="338" height="8" rx="4" fill="#fef104"/>
  <text x="421" y="278" text-anchor="middle" fill="#7f7f7a" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2">DISPLAY VALUE</text>
  <text x="1179" y="278" text-anchor="middle" fill="#7f7f7a" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2">RELATIVE EXPOSURE</text>
</svg>
